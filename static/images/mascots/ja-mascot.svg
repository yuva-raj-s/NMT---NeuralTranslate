<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular base with Japanese theme gradient -->
  <circle cx="60" cy="60" r="55" fill="url(#gradientJA)" />
  
  <!-- Japanese-themed character (resembling a fox/kitsune) -->
  
  <!-- Face -->
  <circle cx="60" cy="60" r="40" fill="#FFFFFF" />
  
  <!-- Fox ears -->
  <path d="M35 35 L 45 15 L 55 35 Z" fill="#FF5555" />
  <path d="M85 35 L 75 15 L 65 35 Z" fill="#FF5555" />
  
  <!-- Eyes -->
  <path d="M45 50 Q 50 45 55 50 Q 50 55 45 50 Z" fill="#333333" />
  <path d="M75 50 Q 70 45 65 50 Q 70 55 75 50 Z" fill="#333333" />
  
  <!-- Eye highlights -->
  <circle cx="48" cy="48" r="2" fill="#FFFFFF" />
  <circle cx="72" cy="48" r="2" fill="#FFFFFF" />
  
  <!-- Nose -->
  <circle cx="60" cy="60" r="4" fill="#FF9999" />
  
  <!-- Japanese symbol and patterns -->
  <circle cx="60" cy="85" r="5" fill="#FF0000" />
  <path d="M55 85 L 65 85" stroke="#FFFFFF" stroke-width="1.5" />
  <path d="M60 80 L 60 90" stroke="#FFFFFF" stroke-width="1.5" />
  
  <!-- Smile -->
  <path d="M45 70 Q60 80 75 70" stroke="#333333" stroke-width="3" fill="none" stroke-linecap="round" />
  
  <!-- Japanese accent patterns -->
  <circle cx="25" cy="75" r="5" fill="#FF0000" opacity="0.7" />
  <circle cx="95" cy="75" r="5" fill="#FF0000" opacity="0.7" />
  <circle cx="25" cy="35" r="5" fill="#FF0000" opacity="0.7" />
  <circle cx="95" cy="35" r="5" fill="#FF0000" opacity="0.7" />
  
  <!-- Cherry blossom accent -->
  <circle cx="85" cy="20" r="8" fill="#FFCCDD" />
  <circle cx="85" cy="16" r="3" fill="#FF99AA" />
  <circle cx="89" cy="20" r="3" fill="#FF99AA" />
  <circle cx="85" cy="24" r="3" fill="#FF99AA" />
  <circle cx="81" cy="20" r="3" fill="#FF99AA" />
  <circle cx="85" cy="20" r="2" fill="#FFEE99" />
  
  <!-- Background gradient definition -->
  <defs>
    <linearGradient id="gradientJA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5555" />
      <stop offset="100%" stop-color="#FF0000" />
    </linearGradient>
  </defs>
</svg>