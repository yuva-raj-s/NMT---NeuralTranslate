<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular base with Indian theme gradient -->
  <circle cx="60" cy="60" r="55" fill="url(#gradientHI)" />
  
  <!-- Indian-themed character (elephant) -->
  
  <!-- Face -->
  <circle cx="60" cy="65" r="38" fill="#7B68EE" />
  
  <!-- Ears -->
  <ellipse cx="30" cy="65" rx="16" ry="22" fill="#7B68EE" />
  <ellipse cx="90" cy="65" rx="16" ry="22" fill="#7B68EE" />
  
  <!-- Inner ears -->
  <ellipse cx="33" cy="65" rx="10" ry="15" fill="#9683EC" />
  <ellipse cx="87" cy="65" rx="10" ry="15" fill="#9683EC" />
  
  <!-- Eyes -->
  <circle cx="45" cy="55" r="6" fill="#FFFFFF" />
  <circle cx="75" cy="55" r="6" fill="#FFFFFF" />
  
  <!-- Eye pupils -->
  <circle cx="45" cy="55" r="2.5" fill="#333333" />
  <circle cx="75" cy="55" r="2.5" fill="#333333" />
  
  <!-- Trunk -->
  <path d="M60 75 Q 70 90 60 105" stroke="#7B68EE" stroke-width="10" fill="none" stroke-linecap="round" />
  
  <!-- Bindi -->
  <circle cx="60" cy="40" r="5" fill="#FF5555" />
  
  <!-- Decorative elements -->
  <path d="M20 30 Q 25 25 30 30 Q 35 35 40 30 Q 45 25 50 30" stroke="#FF9933" stroke-width="2" fill="none" />
  <path d="M70 30 Q 75 25 80 30 Q 85 35 90 30 Q 95 25 100 30" stroke="#FF9933" stroke-width="2" fill="none" />
  
  <!-- Peacock feather accent -->
  <path d="M100 20 Q 90 10 85 20 Q 80 30 90 35" fill="#138808" />
  <path d="M90 35 C 95 25 100 15 95 10" stroke="#138808" stroke-width="2" fill="none" />
  <circle cx="91" cy="16" r="4" fill="#0000FF" />
  <circle cx="91" cy="16" r="2" fill="#138808" />
  
  <!-- Background gradient definition -->
  <defs>
    <linearGradient id="gradientHI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#138808" />
    </linearGradient>
  </defs>
</svg>