<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular base with gradient -->
  <circle cx="60" cy="60" r="55" fill="url(#gradient)" />
  
  <!-- Face -->
  <circle cx="60" cy="60" r="40" fill="#FFFFFF" />
  
  <!-- Eyes -->
  <circle cx="45" cy="50" r="8" fill="#333333" />
  <circle cx="75" cy="50" r="8" fill="#333333" />
  
  <!-- Eye highlights -->
  <circle cx="48" cy="47" r="3" fill="#FFFFFF" />
  <circle cx="78" cy="47" r="3" fill="#FFFFFF" />
  
  <!-- Smile -->
  <path d="M40 70 Q60 90 80 70" stroke="#333333" stroke-width="5" fill="none" stroke-linecap="round" />
  
  <!-- Speech bubble connector -->
  <path d="M98 30 Q 90 50 85 45" stroke="#FFFFFF" stroke-width="3" fill="none" />
  
  <!-- Translator accent elements -->
  <circle cx="27" cy="80" r="6" fill="#4285F4" opacity="0.8" />
  <circle cx="95" cy="75" r="8" fill="#0F9D58" opacity="0.8" />
  <circle cx="85" cy="35" r="5" fill="#F4B400" opacity="0.8" />
  <circle cx="40" cy="25" r="7" fill="#DB4437" opacity="0.8" />
  
  <!-- Background gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285F4" />
      <stop offset="50%" stop-color="#0F9D58" />
      <stop offset="100%" stop-color="#F4B400" />
    </linearGradient>
  </defs>
</svg>