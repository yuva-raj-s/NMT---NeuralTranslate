<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Machine Translation - English to Asian Languages</title>
    
    <!-- Bootstrap CSS (Replit Theme) -->
    <link rel="stylesheet" href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">NMT App</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Translator</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container content-area">
        <h1 class="text-center app-title">Neural Machine Translation</h1>
        <p class="text-center mb-4">Translate English text to various Asian languages using mBART</p>
        
        <!-- Error Message Container -->
        <div id="error-container" class="alert" role="alert"></div>
        
        <!-- Translation Form -->
        <div class="row">
            <div class="col-md-12 mb-3">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-start mb-3">
                    <h4>English Text</h4>
                    <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center">
                        <label for="target-lang" class="me-2">Target Language:</label>
                        <select id="target-lang" class="form-select">
                            {% for code, name in languages.items() %}
                                <option value="{{ code }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <textarea id="source-text" class="form-control" placeholder="Enter English text here..."></textarea>
                <div class="mt-3">
                    <button id="translate-btn" class="btn btn-primary" disabled>
                        <i class="fas fa-language"></i> Translate
                    </button>
                    <button id="clear-btn" class="btn btn-secondary" disabled>
                        <i class="fas fa-eraser"></i> Clear
                    </button>
                    <div id="loading-spinner" class="spinner-border spinner-border-sm text-light"></div>
                </div>
            </div>
        </div>
        
        <!-- Translation Result -->
        <div id="translation-container" class="row mt-4">
            <div class="col-md-12">
                <h4>Translation Result</h4>
                <div id="translation-result" class="p-3 bg-dark rounded"></div>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="footer bg-dark text-light">
        <div class="container">
            <p class="mb-0">Neural Machine Translation App using mBART and ALT dataset</p>
            <small class="text-muted">Created for language translation between English and Asian languages</small>
        </div>
    </footer>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
